name: "Copilot Setup Steps"

# This workflow configures the environment for GitHub Copilot Agent with gh-aw + Pyright MCP servers
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/mcp.json

jobs:
  # The job MUST be called 'copilot-setup-steps' to be recognized by GitHub Copilot Agent
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set minimal permissions for setup steps
    # Copilot Agent receives its own token with appropriate permissions
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install gh-aw extension
        uses: github/gh-aw-actions/setup-cli@b8068426813005612b960b5ab0b8bd2c27142323 # v0.71.5
        with:
          version: v0.71.5

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
        with:
          # Note: https://github.com/marketplace/actions/astral-sh-setup-uv#activate-environment
          activate-environment: true

      - name: uv Install Python
        run: |
          uv python install

      - name: uv Install stubber, poetry, pyright
        run: |
          uv tool install -U micropython-stubber
          uv tool install -U poetry
          uv tool install -U pyright

      - name: Install just
        uses: extractions/setup-just@v4