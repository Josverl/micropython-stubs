
# Check out repos in this structure
# micropython-stubs
# +-- stubs
# +-- repos
#     +-- micropython
#      -- micropython-lib
# repro structure needed to allow automatic PR creation to work
########################################################################################################################################
name: update_stubs

on:
  workflow_dispatch:
#  schedule:
#    - cron: "0 1 * * *" # Run every day at 01:00
env:
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  ########################################################################################################################################
  build-stubs:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stubs repo
        uses: actions/checkout@v4

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
        # with:
        #   # Note: https://github.com/marketplace/actions/astral-sh-setup-uv#activate-environment
        #   activate-environment: true

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install Poetry
        run: uv tool install poetry==1.3.1

      - run: |
          poetry config repositories.test-pypi https://test.pypi.org/legacy/
          poetry config --list
      - run: |
          pip install wheel
          pip install -U micropython-stubber --pre

      - run: |
          stubber --version
          stubber clone --no-stubs

      - name: Update stubs (stable, preview)
        run: |
          just update_stubs stable
          just update_stubs preview

      - name: update all_modules.json
        run: |
          uv run scripts/update_all_modules.py

      - name: commit
        uses: ./.github/actions/commit
        with:
          message: "update stubs"
