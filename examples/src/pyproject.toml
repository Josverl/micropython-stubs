# folder structure:
# .
# ├── pyproject.toml
# └── src
#   ├── main.py
#   └── lib
#     └── helper.py

# ###################################################################
# pyright options:

[tool.pyright]
include = ["src"]
extraPaths = ["src/lib"]
ignore = ["**/typings"]
exclude = [
    ".*",
    "__*",
    "**/typings", 
    "**/node_modules", 
    "**/__pycache__", 
    ".venv",
]

typeCheckingMode = "standard"
stubPath = "typings"
typeshedPath = "typings"
pythonPlatform = "Linux"

reportMissingModuleSource = "none"

# ###################################################################
# mypy options:
[tool.mypy]
# places to check
files = "src/*.py"
mypy_path = "src/lib,typings"

platform = "linux"
custom_typeshed_dir = "typings" # allow mypy to use micropython-stdlib
exclude = [
    "typings[\\/].*",  # TOML basic string
    ".*",
    "__*",
    "**/node_modules", 
    "**/__pycache__", 
    ".venv",
]

follow_imports = "silent"
follow_imports_for_stubs = true
no_site_packages = true
check_untyped_defs = true
disable_error_code = ["no-redef","assignment"] 


# ###################################################################
# ty options:

[tool.ty.environment]
python-platform = "linux"
extra-paths = ["typings"]
typeshed = "./typings-stdlib"  # This is a workaround for: https://github.com/astral-sh/ty/issues/523

[tool.ty.src]
include = ["src"]
exclude = [
    ".*",
    "__*",
    "typings/**",
]

[tool.ty.analysis]
respect-type-ignore-comments = true

[tool.ty.terminal]
output-format = "full"
error-on-warning = false

# ###################################################################
